<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Wall 测试页面</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: #F1F5F9;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #FBBF24 0%, #F59E0B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        .status {
            padding: 20px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .success {
            border: 2px solid #10B981;
        }
        .error {
            border: 2px solid #EF4444;
        }
        .memory-orb {
            display: inline-block;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 10px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        code {
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Memory Wall 测试</h1>
        
        <div class="status success">
            <h2>✅ 服务器运行正常！</h2>
            <p>如果你看到这个页面，说明网络访问没问题。</p>
        </div>

        <h2>🔮 记忆球测试</h2>
        <div>
            <div class="memory-orb" style="background: #FBBF24; box-shadow: 0 0 30px #FBBF24;"></div>
            <div class="memory-orb" style="background: #3B82F6; box-shadow: 0 0 30px #3B82F6;"></div>
            <div class="memory-orb" style="background: #10B981; box-shadow: 0 0 30px #10B981;"></div>
            <div class="memory-orb" style="background: #8B5CF6; box-shadow: 0 0 30px #8B5CF6;"></div>
        </div>

        <h2>📋 测试清单</h2>
        <ul style="line-height: 2;">
            <li>✅ 页面加载成功</li>
            <li>✅ CSS 样式正常</li>
            <li>✅ 动画效果正常</li>
            <li>⏳ React 应用待测试</li>
        </ul>

        <h2>🔗 下一步</h2>
        <p>访问完整应用：<a href="http://localhost:3000" style="color: #FBBF24;">http://localhost:3000</a></p>
        
        <p style="margin-top: 40px; color: rgba(255,255,255,0.5);">
            服务器运行在 <code>0.0.0.0:3000</code><br>
            监听所有网络接口
        </p>
    </div>

    <script>
        console.log('Memory Wall 测试页面加载成功！');
        console.log('当前时间:', new Date().toLocaleString('zh-CN'));
    </script>
</body>
</html>
