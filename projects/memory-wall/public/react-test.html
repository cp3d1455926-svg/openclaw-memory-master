<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Wall - React 测试</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: #F1F5F9;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        .orb {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), transparent);
            animation: pulse 2s infinite;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .orb:hover {
            transform: scale(1.1);
        }
        .orb-yellow {
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), #FBBF24);
            box-shadow: 0 0 40px #FBBF24;
        }
        .orb-blue {
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), #3B82F6);
            box-shadow: 0 0 40px #3B82F6;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        #root {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #FBBF24 0%, #F59E0B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .debug-info {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="root">
        <h1>🧠 Memory Wall 测试</h1>
        <p>如果看到这个页面，说明 HTML 加载正常。</p>
        
        <h2>纯 CSS 记忆球：</h2>
        <div class="orb orb-yellow"></div>
        <div class="orb orb-blue"></div>
        
        <div class="debug-info">
            <h3>调试信息：</h3>
            <div id="info">等待 React 加载...</div>
        </div>
    </div>

    <script type="module">
        // 显示加载信息
        const infoDiv = document.getElementById('info');
        infoDiv.innerHTML = '<div>✅ HTML 加载成功</div><div>⏳ 等待 React...</div>';
        
        // 动态导入 React
        import('https://esm.sh/react@18.3.1').then(React => {
            infoDiv.innerHTML += '<div>✅ React 加载成功</div>';
            console.log('React loaded:', React);
        }).catch(err => {
            infoDiv.innerHTML += `<div style="color: #EF4444">❌ React 加载失败：${err.message}</div>`;
            console.error('React load error:', err);
        });
    </script>
</body>
</html>
